<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Badmy Match Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap');
        body { font-family: 'Kanit', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-3 sm:p-6">
    <div class="max-w-4xl mx-auto">
        
        <header class="flex items-center justify-between mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-2xl font-extrabold text-indigo-600 flex items-center gap-2">🏸 BadmyMatch</h1>
                <p class="text-slate-500 text-xs">ระบบจัดคู่แบดมินตันสำหรับชาวก๊วน</p>
            </div>
            <button onclick="resetAll()" class="p-2 text-slate-400 hover:text-red-500 rounded-full transition-all">
                <i data-lucide="rotate-ccw"></i>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="space-y-6">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-700">
                        <i data-lucide="user-plus" class="text-indigo-500 w-5 h-5"></i> เพิ่มผู้เล่น
                    </h2>
                    <div class="space-y-4">
                        <input type="text" id="playerName" placeholder="ชื่อผู้เล่น" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:outline-none text-base">
                        <div class="bg-slate-50 p-3 rounded-2xl border border-slate-200">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">ระดับฝีมือ (<span id="skillVal">3</span> ดาว)</label>
                            <input type="range" id="playerSkill" min="1" max="5" value="3" oninput="document.getElementById('skillVal').innerText = this.value" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                        </div>
                        <button onclick="addPlayer()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-md active:scale-95 flex items-center justify-center gap-2">เพิ่มเข้าก๊วน</button>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <div class="flex items-center justify-between">
                        <span class="font-bold text-slate-700 flex items-center gap-2"><i data-lucide="layout-grid" class="text-indigo-500 w-5 h-5"></i> จำนวนคอร์ท</span>
                        <input type="number" id="courtCount" value="1" min="1" class="w-16 p-2 text-center border border-slate-200 rounded-xl font-bold text-indigo-600">
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 h-fit">
                <h2 class="text-lg font-bold mb-4 flex items-center justify-between text-slate-700">
                    <span>สมาชิก (<span id="playerCount">0</span>)</span>
                </h2>
                <div id="playerList" class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-[250px] overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>
        </div>

        <div class="mt-8 space-y-6">
            <div class="flex gap-3">
                <button onclick="generateMatches()" class="flex-[2] py-5 bg-emerald-500 text-white rounded-3xl font-black text-xl shadow-lg active:scale-95 flex items-center justify-center gap-2">จัดคู่เลย!</button>
                <button onclick="clearHistory()" class="flex-1 py-5 bg-white border border-slate-200 rounded-3xl text-slate-500 font-bold active:scale-95 flex items-center justify-center gap-2"><i data-lucide="history"></i></button>
            </div>

            <div id="results" class="hidden space-y-4">
                <h2 class="text-xl font-black text-slate-800 underline decoration-indigo-300 underline-offset-8">ผลการจัดสนาม</h2>
                <div id="matchGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                <div id="waitingSection" class="hidden bg-amber-50 p-5 rounded-[2rem] border border-amber-100 shadow-inner">
                    <h3 class="text-amber-700 font-black text-sm mb-3 uppercase tracking-wider">⏳ พักรอ / บาย</h3>
                    <div id="waitingList" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('badmy_players')) || [];
        let matchHistory = [];

        function save() {
            localStorage.setItem('badmy_players', JSON.stringify(players));
            renderPlayers();
        }

        function addPlayer() {
            const nameInput = document.getElementById('playerName');
            const skill = parseInt(document.getElementById('playerSkill').value);
            if (!nameInput.value.trim()) return;
            players.push({ id: Date.now().toString(), name: nameInput.value.trim(), skill });
            nameInput.value = '';
            save();
        }

        function removePlayer(id) {
            players = players.filter(p => p.id !== id);
            save();
        }

        function renderPlayers() {
            const list = document.getElementById('playerList');
            document.getElementById('playerCount').innerText = players.length;
            list.innerHTML = players.map(p => `
                <div class="flex items-center justify-between bg-slate-50 p-3 rounded-2xl border border-slate-100 group">
                    <div class="text-sm font-bold text-slate-700">${p.name} <span class="text-indigo-400 font-normal">⭐${p.skill}</span></div>
                    <button onclick="removePlayer('${p.id}')" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function generateMatches() {
            if (players.length < 2) return;
            const courtCount = parseInt(document.getElementById('courtCount').value);
            let pool = [...players].sort((a, b) => (b.skill - a.skill) + (Math.random() - 0.5));
            const matches = [];
            
            for (let c = 0; c < courtCount; c++) {
                if (pool.length < 2) break;
                let p1 = pool.shift();
                let p2Idx = pool.findIndex(p => !matchHistory.includes([p1.id, p.id].sort().join('-')));
                if (p2Idx === -1) p2Idx = 0;
                let p2 = pool.splice(p2Idx, 1)[0];
                matches.push({ court: c + 1, p1, p2 });
                matchHistory.push([p1.id, p2.id].sort().join('-'));
            }

            display(matches, pool);
        }

        function display(matches, waiting) {
            const res = document.getElementById('results');
            const grid = document.getElementById('matchGrid');
            const waitSection = document.getElementById('waitingSection');
            const waitList = document.getElementById('waitingList');

            res.classList.remove('hidden');
            grid.innerHTML = matches.map(m => `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-indigo-600 text-white px-3 py-1 rounded-bl-2xl text-[10px] font-bold">COURT ${m.court}</div>
                    <div class="flex justify-between items-center px-2">
                        <div class="text-center w-5/12 font-black text-lg text-slate-800 truncate">${m.p1.name}</div>
                        <div class="text-indigo-200 font-black italic animate-pulse text-xl">VS</div>
                        <div class="text-center w-5/12 font-black text-lg text-slate-800 truncate">${m.p2.name}</div>
                    </div>
                </div>
            `).join('');

            if (waiting.length > 0) {
                waitSection.classList.remove('hidden');
                waitList.innerHTML = waiting.map(p => `
                    <div class="bg-white px-4 py-2 rounded-2xl text-sm font-bold text-amber-900 shadow-sm border border-amber-200">${p.name}</div>
                `).join('');
            } else {
                waitSection.classList.add('hidden');
            }
        }

        function clearHistory() { matchHistory = []; alert('ล้างประวัติคู่ซ้ำแล้ว'); }
        function resetAll() { if(confirm('ล้างข้อมูลทั้งหมด?')) { players = []; save(); location.reload(); } }

        renderPlayers();
        lucide.createIcons();
    </script>
</body>
</html>
