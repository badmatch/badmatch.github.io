<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bad Match</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Kanit',sans-serif; background:#f1f5f9; padding-bottom:84px; }
        .page { display:none; } .page.active { display:block; }

        .bottom-nav { position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e2e8f0;display:flex;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.07); }
        .nav-btn { flex:1;padding:13px 8px 11px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:700;color:#94a3b8;border:none;background:none;cursor:pointer;transition:color 0.2s; }
        .nav-btn.active { color:#4f46e5; }

        .btn-indigo  { background:linear-gradient(135deg,#6366f1,#4f46e5);box-shadow:0 4px 20px rgba(99,102,241,0.3); }
        .btn-green   { background:linear-gradient(135deg,#22c55e,#16a34a);box-shadow:0 4px 20px rgba(34,197,94,0.3); }
        .btn-emerald { background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 4px 20px rgba(16,185,129,0.3); }

        .court-card { background:white;border-radius:2rem;overflow:hidden;border:2px solid #e2e8f0;box-shadow:0 2px 12px rgba(0,0,0,0.05); transition:border-color 0.2s,box-shadow 0.2s; }
        .court-card.playing { border-color:#6366f1;box-shadow:0 4px 20px rgba(99,102,241,0.13); }
        .court-card.idle { border-color:#e2e8f0;opacity:0.8; }

        .team-a { background:linear-gradient(135deg,#eef2ff,#e0e7ff); }
        .team-b { background:linear-gradient(135deg,#fff1f2,#ffe4e6); }

        .money-card { background:white;border-radius:1.75rem;border:1px solid #e2e8f0;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.04); }
        .owes-row { display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f1f5f9;gap:8px; }
        .owes-row:last-child { border-bottom:none; }

        .chip { display:inline-flex;align-items:center;border-radius:99px;padding:2px 9px;font-size:11px;font-weight:700; }
        .chip-yellow { background:#fef9c3;color:#854d0e;border:1px solid #fde68a; }
        .chip-green  { background:#dcfce7;color:#166534; }

        .badge-game { display:inline-flex;align-items:center;background:#e0e7ff;color:#4338ca;border-radius:99px;padding:1px 8px;font-size:11px;font-weight:700;gap:3px; }
        .badge-game.top { background:#fef3c7;color:#b45309; }

        .shuttle-entry { background:#f8fafc;border-radius:1.2rem;padding:11px 13px;border:1px solid #e2e8f0; }

        .q-chip { display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:99px;font-size:12px;font-weight:700;border:2px solid #e2e8f0;background:white;color:#475569; }
        .q-chip.next { border-color:#f59e0b;background:#fefce8;color:#92400e; }

        .res-btn { flex:1;border-radius:.9rem;font-weight:800;font-size:12px;border:2px solid;cursor:pointer;padding:8px 2px;transition:all 0.15s;text-align:center; }
        .res-a    { border-color:#6366f1;color:#6366f1;background:white; }
        .res-a.on { background:#6366f1;color:white; }
        .res-d    { flex:0.6;border-color:#94a3b8;color:#94a3b8;background:white; }
        .res-d.on { background:#94a3b8;color:white; }
        .res-b    { border-color:#f43f5e;color:#f43f5e;background:white; }
        .res-b.on { background:#f43f5e;color:white; }

        .stat-card { background:white;border-radius:1.5rem;border:1px solid #e2e8f0;overflow:hidden; }
        .winbar-bg { background:#f1f5f9;border-radius:99px;height:6px;overflow:hidden; }
        .winbar-fill { height:6px;border-radius:99px;background:linear-gradient(90deg,#6366f1,#22c55e); }

        input[type=range]::-webkit-slider-thumb { -webkit-appearance:none;height:18px;width:18px;border-radius:50%;background:#4f46e5;cursor:pointer; }
        .player-row:hover { background:#f8fafc; }
        @keyframes pop-in { 0%{opacity:0;transform:scale(0.93) translateY(8px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
        .pop-in { animation:pop-in 0.2s ease forwards; }
        #toast { position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:10px 22px;border-radius:99px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap; }
    </style>
</head>
<body class="min-h-screen">
<div id="toast"></div>
<div class="max-w-4xl mx-auto p-3 sm:p-6">

    <header class="flex items-center justify-between mb-5 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
        <div>
            <h1 class="text-2xl font-extrabold text-indigo-600 flex items-center gap-2">
                🏸 Bad Match <span class="text-xs bg-indigo-100 text-indigo-500 px-2 py-1 rounded-lg font-semibold">2v2</span>
            </h1>
            <p class="text-slate-400 text-xs">by <span class="text-indigo-400 font-semibold">prem</span> · ระบบจัดคู่แบดมินตันแบบทีม</p>
        </div>
        <button onclick="resetAll()" class="p-2 text-slate-300 hover:text-red-400 rounded-full transition-all"><i data-lucide="rotate-ccw"></i></button>
    </header>

    <div id="page-match" class="page active">

        <div id="setupPanel" class="space-y-5">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">
                <div class="space-y-4">
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                        <h2 class="text-base font-bold mb-4 flex items-center gap-2 text-slate-700"><i data-lucide="user-plus" class="text-indigo-500 w-5 h-5"></i> เพิ่มผู้เล่น</h2>
                        <div class="space-y-3">
                            <input type="text" id="playerName" placeholder="ชื่อผู้เล่น"
                                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-400 focus:outline-none text-base"
                                onkeydown="if(event.key==='Enter') addPlayer()">
                            <div class="bg-slate-50 p-3 rounded-2xl border border-slate-200">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">ระดับฝีมือ (<span id="skillVal">3</span> ดาว)</label>
                                <input type="range" id="playerSkill" min="1" max="5" value="3"
                                    oninput="document.getElementById('skillVal').innerText=this.value"
                                    class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                            </div>
                            <button onclick="addPlayer()" class="btn-indigo w-full py-3.5 text-white rounded-2xl font-bold active:scale-95 transition-transform">เพิ่มเข้าก๊วน</button>
                        </div>
                    </div>
                    
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                        <div class="flex items-center justify-between mb-4">
                            <span class="font-bold text-slate-700 flex items-center gap-2 text-sm"><i data-lucide="layout-grid" class="text-indigo-500 w-4 h-4"></i> จำนวนคอร์ท</span>
                            <input type="number" id="courtCount" value="2" min="1" max="10" class="w-16 p-2 text-center border border-slate-200 rounded-xl font-bold text-indigo-600">
                        </div>
                        <h2 class="text-sm font-bold mb-2 flex items-center gap-2 text-slate-700"><i data-lucide="settings-2" class="text-indigo-500 w-4 h-4"></i> โหมดจัดทีม</h2>
                        <select id="matchMode" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                            <option value="1">1. Shuffle (สุ่มสลับคู่ เน้นบาลานซ์)</option>
                            <option value="2">2. Rotation (จับคู่ถาวร + ชนะอยู่ต่อ)</option>
                            <option value="3">3. Knockout (สายแข่ง 7-8 คน)</option>
                        </select>
                    </div>
                </div>
                
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-base font-bold mb-1 text-slate-700 flex items-center justify-between">
                        <span>สมาชิก (<span id="playerCount">0</span> คน)</span>
                        <span class="text-[10px] text-slate-400 font-normal">เกม = รอบที่เล่น</span>
                    </h2>
                    <div id="playerList" class="divide-y divide-slate-50 max-h-[380px] overflow-y-auto mt-3"></div>
                </div>
            </div>
            <button onclick="startSession()" class="btn-green w-full py-5 text-white rounded-3xl font-black text-xl active:scale-95 transition-transform flex items-center justify-center gap-2">
                <i data-lucide="play" class="w-6 h-6"></i> เริ่มเซสชันการเล่น!
            </button>
        </div>

        <div id="sessionPanel" class="hidden space-y-4">
            
            <div id="modeIndicator" class="bg-indigo-50 border border-indigo-100 text-indigo-700 px-4 py-2.5 rounded-2xl text-xs font-bold flex justify-between items-center">
                <span id="modeText">Mode: Shuffle</span>
                <span id="koRoundText" class="text-[10px] bg-indigo-200 text-indigo-800 px-2 py-0.5 rounded-full hidden"></span>
            </div>

            <div id="queueContainer" class="bg-white rounded-3xl border border-slate-100 shadow-sm p-4">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2">
                        <i data-lucide="clock" class="w-4 h-4 text-amber-400"></i>
                        <span class="font-black text-slate-700 text-sm">คิวรอ</span>
                        <span id="queueCountBadge" class="bg-amber-100 text-amber-700 font-black text-xs px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <button onclick="toggleSetup()" class="text-[10px] text-slate-400 hover:text-indigo-500 font-bold flex items-center gap-1 transition-colors">
                        <i data-lucide="users" class="w-3 h-3"></i> จัดการก๊วน
                    </button>
                </div>
                <div id="queueList" class="flex flex-wrap gap-2 min-h-[32px] items-center"></div>
            </div>

            <div id="courtCards" class="space-y-4"></div>

            <button onclick="clearHistory()" class="w-full py-3 bg-white border border-slate-100 text-slate-400 rounded-2xl text-xs font-bold active:scale-95 transition-transform flex items-center justify-center gap-1.5">
                <i data-lucide="history" class="w-3.5 h-3.5"></i> ล้างประวัติทั้งหมด
            </button>
        </div>
    </div>

    <div id="page-stats" class="page">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-black text-slate-800">สถิติผู้เล่น 📊</h2>
            <button onclick="clearAllStats()" class="text-xs text-slate-400 hover:text-red-400 font-bold">ล้างสถิติ</button>
        </div>
        <div id="statsList" class="space-y-3"></div>
        <p id="statsEmpty" class="text-slate-300 text-sm text-center py-12">ยังไม่มีสถิติ<br>เล่นและบันทึกผลก่อนนะ</p>
    </div>

    <div id="page-money" class="page">
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-4">
            <h2 class="text-base font-bold mb-3 flex items-center gap-2 text-slate-700"><i data-lucide="wallet" class="text-emerald-500 w-5 h-5"></i> ใครจ่ายไปก่อน?</h2>
            <select id="payerSelect" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-base font-bold text-slate-700 mb-3 focus:outline-none focus:ring-2 focus:ring-emerald-400">
                <option value="">-- เลือกคนที่จ่ายก่อน --</option>
            </select>
            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">ค่าคอร์ท (บาท)</label>
            <input type="number" id="courtFee" value="0" min="0" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-base font-bold text-slate-700 focus:outline-none focus:ring-2 focus:ring-emerald-400">
        </div>
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-base font-bold flex items-center gap-2 text-slate-700"><i data-lucide="feather" class="text-emerald-500 w-5 h-5"></i> ลูกแบดที่ใช้</h2>
                <button onclick="addShuttleEntry()" class="text-xs bg-emerald-50 text-emerald-600 font-bold px-3 py-1.5 rounded-xl hover:bg-emerald-100 flex items-center gap-1"><i data-lucide="plus" class="w-3 h-3"></i> เพิ่ม</button>
            </div>
            <div id="shuttleList" class="space-y-2"></div>
            <p id="shuttleEmpty" class="text-slate-300 text-sm text-center py-4">กดเพิ่มรายการเพื่อระบุลูกที่ใช้</p>
            <div id="shuttleSummaryBar" class="hidden mt-3 bg-emerald-50 rounded-2xl px-4 py-2.5 flex items-center justify-between">
                <span class="text-xs text-emerald-700 font-bold">รวม</span>
                <span id="shuttleTotalText" class="text-sm font-black text-emerald-700"></span>
            </div>
        </div>
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-base font-bold flex items-center gap-2 text-slate-700"><i data-lucide="users" class="text-emerald-500 w-5 h-5"></i> คนที่ร่วมหาร</h2>
                <div class="flex gap-2">
                    <button onclick="toggleAllSplit(true)" class="text-[10px] text-indigo-500 font-bold hover:underline">ทั้งหมด</button>
                    <span class="text-slate-300 text-xs">|</span>
                    <button onclick="toggleAllSplit(false)" class="text-[10px] text-slate-400 font-bold hover:underline">ล้าง</button>
                </div>
            </div>
            <div id="splitPlayerList" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
        </div>
        <button onclick="calculateMoney()" class="btn-emerald w-full py-5 text-white rounded-3xl font-black text-xl active:scale-95 transition-transform flex items-center justify-center gap-2 mb-5">
            <i data-lucide="calculator" class="w-6 h-6"></i> คำนวณยอดสุทธิ
        </button>
        <div id="moneyResult" class="hidden space-y-3"></div>
    </div>

</div>
<nav class="bottom-nav">
    <button class="nav-btn active" id="nav-match" onclick="switchTab('match')"><i data-lucide="shuffle" class="w-5 h-5"></i><span>จัดคู่</span></button>
    <button class="nav-btn" id="nav-stats" onclick="switchTab('stats')"><i data-lucide="bar-chart-2" class="w-5 h-5"></i><span>สถิติ</span></button>
    <button class="nav-btn" id="nav-money" onclick="switchTab('money')"><i data-lucide="receipt" class="w-5 h-5"></i><span>คิดเงิน</span></button>
</nav>

<script>
// ================================================================
// STATE
// ================================================================
let players        = JSON.parse(localStorage.getItem('bm_players')) || [];
let partnerHistory = [];
let opponentHistory = [];
let shuttleEntries = [];
let splitSelected  = {};

let courts       = [];
let waitingQueue  = []; // Mode 1 uses Player IDs
let sessionActive = false;
let currentMode   = 1; 

// โหมด 2: Rotation (Fixed Teams & King of the Court)
let fixedTeams = []; // [{id, label, p1, p2, streak, played:[]}]
let teamQueue = [];  // Array of Team IDs waiting

// โหมด 3: Knockout State
let koState = { round: 1, matches: [], winners: [], losers: [] };

players.forEach(p => {
    if (!p.wins)   p.wins   = 0;
    if (!p.losses) p.losses = 0;
    if (!p.draws)  p.draws  = 0;
    if (!p.games)  p.games  = 0;
    splitSelected[p.id] = true;
});

function save() { localStorage.setItem('bm_players', JSON.stringify(players)); renderPlayers(); }

// ================================================================
// TABS & PLAYERS
// ================================================================
function switchTab(tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-'+tab).classList.add('active');
    document.getElementById('nav-'+tab).classList.add('active');
    if (tab==='money') renderMoneyPage();
    if (tab==='stats') renderStats();
}

function addPlayer() {
    const inp = document.getElementById('playerName');
    const name = inp.value.trim();
    const skill = parseInt(document.getElementById('playerSkill').value);
    if (!name) return;
    const id = Math.random().toString(36).substr(2,9);
    players.push({ id, name, skill, games:0, wins:0, losses:0, draws:0 });
    splitSelected[id] = true;
    if (sessionActive && currentMode === 1) { waitingQueue.push(id); renderSession(); }
    inp.value = '';
    save();
}

function removePlayer(id) {
    waitingQueue = waitingQueue.filter(x => x!==id);
    players = players.filter(p => p.id!==id);
    delete splitSelected[id];
    if (sessionActive) renderSession();
    save();
}

function adjustGames(id, delta) {
    const p = players.find(p=>p.id===id);
    if (p) { p.games = Math.max(0, p.games+delta); save(); }
}

function renderPlayers() {
    const list = document.getElementById('playerList');
    document.getElementById('playerCount').innerText = players.length;
    if (!players.length) {
        list.innerHTML = '<p class="text-slate-300 text-sm text-center py-6">ยังไม่มีสมาชิก</p>';
        return;
    }
    const maxG = Math.max(...players.map(p=>p.games));
    list.innerHTML = players.map(p => {
        const top = p.games===maxG && maxG>0;
        return `<div class="player-row flex items-center justify-between py-2.5 px-2 rounded-xl">
            <div class="flex items-center gap-2">
                <span class="text-sm font-bold text-slate-700">${p.name}</span>
                <span class="text-indigo-300 text-xs">&#11088;${p.skill}</span>
            </div>
            <div class="flex items-center gap-1.5">
                <button onclick="adjustGames('${p.id}',-1)" class="w-6 h-6 flex items-center justify-center rounded-full bg-slate-100 hover:bg-red-100 text-slate-400 text-sm transition-colors">&#8722;</button>
                <span class="badge-game ${top?'top':''}" style="min-width:56px;justify-content:center">&#127918; ${p.games}</span>
                <button onclick="adjustGames('${p.id}',1)" class="w-6 h-6 flex items-center justify-center rounded-full bg-slate-100 hover:bg-indigo-100 text-slate-400 text-sm transition-colors">&#43;</button>
                <button onclick="removePlayer('${p.id}')" class="text-slate-200 hover:text-red-400 ml-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
        </div>`;
    }).join('');
    lucide.createIcons();
}

function toggleSetup() { document.getElementById('setupPanel').classList.toggle('hidden'); }

// ================================================================
// START SESSION (3 MODES)
// ================================================================
function startSession() {
    currentMode = parseInt(document.getElementById('matchMode').value);
    const n = Math.max(1, parseInt(document.getElementById('courtCount').value) || 1);
    
    if (currentMode === 3 && (players.length < 7 || players.length > 8)) {
        alert('โหมด Knockout รองรับผู้เล่น 7 หรือ 8 คนเท่านั้นครับ'); return;
    }
    if (players.length < 4) { alert('ต้องมีผู้เล่นอย่างน้อย 4 คน'); return; }

    sessionActive = true;
    partnerHistory = [];
    opponentHistory = [];
    
    document.getElementById('modeText').innerText = 
        currentMode === 1 ? 'Mode: 1. Shuffle (สุ่มบาลานซ์)' : 
        currentMode === 2 ? 'Mode: 2. Rotation (จับคู่ถาวร/ชนะอยู่ต่อ)' : 'Mode: 3. Knockout Tournament';

    // Init courts
    courts = Array.from({length:n}, (_,i) => ({
        id:i+1, status:'idle', teamA:[], teamB:[], result:null, 
        teamA_id: null, teamB_id: null, koMatchId: null, koLabel: ''
    }));

    document.getElementById('queueContainer').classList.remove('hidden');
    document.getElementById('koRoundText').classList.add('hidden');

    if (currentMode === 1) {
        waitingQueue = [...players].sort((a,b) => a.games-b.games).map(p=>p.id);
        courts.forEach(c => tryFillCourtMode1(c));
    } 
    else if (currentMode === 2) {
        initRotationMode();
    }
    else if (currentMode === 3) {
        document.getElementById('queueContainer').classList.add('hidden');
        document.getElementById('koRoundText').classList.remove('hidden');
        initKnockoutMode();
    }

    document.getElementById('setupPanel').classList.add('hidden');
    document.getElementById('sessionPanel').classList.remove('hidden');
    renderSession();
}

// ================================================================
// MODE 1: SHUFFLE
// ================================================================
function tryFillCourtMode1(court) {
    if (waitingQueue.length < 4) return false;
    waitingQueue.sort((a,b) => {
        const pA = players.find(p=>p.id===a), pB = players.find(p=>p.id===b);
        if (!pA||!pB) return 0;
        return pA.games !== pB.games ? pA.games - pB.games : Math.random() - 0.5;
    });
    const ids = waitingQueue.splice(0, 4);
    const group = ids.map(id => players.find(p=>p.id===id)).filter(Boolean);
    
    const ss = arr => arr.reduce((s,p)=>s+p.skill,0);
    const opts = [
        {t1:[group[0],group[1]],t2:[group[2],group[3]]},
        {t1:[group[0],group[2]],t2:[group[1],group[3]]},
        {t1:[group[0],group[3]],t2:[group[1],group[2]]},
    ];
    opts.forEach(o => {
        o.bal = Math.abs(ss(o.t1)-ss(o.t2));
        o.hist = (partnerHistory.includes([o.t1[0].id,o.t1[1].id].sort().join('-'))?1:0) + 
                 (partnerHistory.includes([o.t2[0].id,o.t2[1].id].sort().join('-'))?1:0);
    });
    opts.sort((a,b) => a.bal!==b.bal ? a.bal-b.bal : a.hist-b.hist);
    
    court.teamA = opts[0].t1; court.teamB = opts[0].t2;
    court.status = 'playing'; court.result = null;
    return true;
}

// ================================================================
// MODE 2: ROTATION (FIXED TEAMS + KING OF COURT)
// ================================================================
function initRotationMode() {
    let pool = [...players];
    // ถ้าจำนวนผู้เล่นคี่ ให้ยืมคนที่เล่นน้อยสุดมา 1 คน
    if (pool.length % 2 !== 0) {
        let p = pool.sort((a,b)=>a.games-b.games)[0];
        pool.push({...p, id: p.id+'_ghost', name: p.name+' (ยืม)'});
    }
    
    // จับคู่แบบสุ่มตอนเริ่มต้น
    pool.sort(()=>Math.random()-0.5);
    fixedTeams = [];
    teamQueue = [];
    
    for(let i=0; i<pool.length; i+=2) {
        let tId = 'T' + (i/2 + 1);
        fixedTeams.push({
            id: tId, label: 'ทีม ' + (i/2 + 1),
            p1: pool[i], p2: pool[i+1],
            streak: 0, played: []
        });
        teamQueue.push(tId);
    }
    
    // โหลดทีมลงสนามเท่าที่คอร์ทว่าง
    courts.forEach(c => {
    if(teamQueue.length >= 2) {
        // ดึงคิวออกมาก่อน (แก้ไข Bug ตรงนี้)
        let idA = teamQueue.shift();
        let idB = teamQueue.shift();
        
        let tA = fixedTeams.find(t => t.id === idA);
        let tB = fixedTeams.find(t => t.id === idB);
        
        c.status = 'playing';
        c.teamA = [tA.p1, tA.p2]; 
        c.teamB = [tB.p1, tB.p2];
        c.teamA_id = tA.id; 
        c.teamB_id = tB.id;
        c.result = null;
    }
});
}

function handleMode2Finish(court) {
    let tA = fixedTeams.find(t=>t.id === court.teamA_id);
    let tB = fixedTeams.find(t=>t.id === court.teamB_id);

    tA.played.push(tB.id); tB.played.push(tA.id);

    let winnerTeam, loserTeam, staySide;
    if (court.result === 'A') { winnerTeam = tA; loserTeam = tB; staySide = 'A'; }
    else if (court.result === 'B') { winnerTeam = tB; loserTeam = tA; staySide = 'B'; }
    else { 
        // ถ้าเสมอ ให้กอดคอกันออกทั้งคู่เพื่อรันคิว
        tA.streak = 0; tB.streak = 0;
        teamQueue.push(tA.id); teamQueue.push(tB.id);
        fillMode2Court(court, 2);
        return;
    }

    loserTeam.streak = 0;
    teamQueue.push(loserTeam.id);

    winnerTeam.streak++;
    if (winnerTeam.streak >= 2) {
        // ชนะ 2 ติด ให้ลงไปต่อคิว
        winnerTeam.streak = 0;
        teamQueue.push(winnerTeam.id);
        fillMode2Court(court, 2);
    } else {
        // ชนะอยู่ต่อ เรียกคิวใหม่ 1 ทีม
        fillMode2Court(court, 1, staySide);
    }
}

function fillMode2Court(court, needed, staySide) {
    if (needed === 2) {
        if (teamQueue.length >= 2) {
            // ดึงคิวออกมาก่อน
            let idA = teamQueue.shift();
            let idB = teamQueue.shift();
            
            let nA = fixedTeams.find(t => t.id === idA);
            let nB = fixedTeams.find(t => t.id === idB);
            
            court.teamA = [nA.p1, nA.p2]; 
            court.teamB = [nB.p1, nB.p2];
            court.teamA_id = nA.id; 
            court.teamB_id = nB.id;
            court.result = null; 
            court.status = 'playing';
        } else { 
            court.status = 'idle'; 
            court.teamA = []; 
            court.teamB = []; 
        }
    } else if (needed === 1) {
        if (teamQueue.length >= 1) {
            // ดึงคิวออกมาก่อน
            let idChallenger = teamQueue.shift();
            let challenger = fixedTeams.find(t => t.id === idChallenger);
            
            if (staySide === 'A') { 
                court.teamB = [challenger.p1, challenger.p2]; 
                court.teamB_id = challenger.id; 
            } else { 
                court.teamA = [challenger.p1, challenger.p2]; 
                court.teamA_id = challenger.id; 
            }
            court.result = null; 
            court.status = 'playing';
        } else { 
            court.status = 'idle'; 
            court.teamA = []; 
            court.teamB = []; 
        }
    }
}

// ================================================================
// MODE 3: KNOCKOUT
// ================================================================
function initKnockoutMode() {
    let pool = [...players];
    if (pool.length === 7) {
        let p = pool.sort((a,b)=>a.games-b.games)[0];
        pool.push({...p, id: p.id+'_ghost', name: p.name+' (ยืม)'});
    }
    pool.sort(()=>Math.random()-0.5);
    koState = {
        round: 1, winners: [], losers: [],
        matches: [
            { id: 1, tA: [pool[0], pool[1]], tB: [pool[2], pool[3]], res: null, done: false, label: 'รอบรองฯ คู่ 1' },
            { id: 2, tA: [pool[4], pool[5]], tB: [pool[6], pool[7]], res: null, done: false, label: 'รอบรองฯ คู่ 2' }
        ]
    };
    assignKoMatches();
}
function assignKoMatches() {
    let pending = koState.matches.filter(m => !m.done && !courts.some(c => c.koMatchId === m.id));
    courts.filter(c => c.status === 'idle').forEach(c => {
        let m = pending.shift();
        if (m) { c.status = 'playing'; c.teamA = m.tA; c.teamB = m.tB; c.result = null; c.koMatchId = m.id; c.koLabel = m.label; }
    });
}

// ================================================================
// FINISH MATCH ACTION
// ================================================================
function updateStats(team, isWin, isDraw) {
    team.forEach(p => {
        let realId = p.id.replace('_ghost','');
        const x = players.find(x=>x.id===realId);
        if(x) {
            x.games++;
            if (isDraw) x.draws++;
            else if (isWin) x.wins++;
            else x.losses++;
        }
    });
}

function finishCourt(courtId) {
    const court = courts.find(c=>c.id===courtId);
    if (!court || !court.result) { showToast('เลือกผลการแข่งก่อนนะ 👆'); return; }

    const {teamA, teamB, result} = court;
    partnerHistory.push([teamA[0].id, teamA[1].id].sort().join('-'));
    partnerHistory.push([teamB[0].id, teamB[1].id].sort().join('-'));

    updateStats(teamA, result==='A', result==='D');
    updateStats(teamB, result==='B', result==='D');
    save();

    if (currentMode === 1) {
        [...court.teamA, ...court.teamB].forEach(p => { if (!waitingQueue.includes(p.id)) waitingQueue.push(p.id); });
        court.teamA = []; court.teamB = []; court.status = 'idle'; court.result = null;
        const filled = tryFillCourtMode1(court);
        showToast(filled ? `บันทึกแล้ว — ดึงคิวใหม่ลงสนาม!` : `บันทึกแล้ว — รอคิวเพิ่ม`);
    } 
    else if (currentMode === 2) {
        handleMode2Finish(court);
        showToast('บันทึกผล เลื่อนคิวโหมดเวียนคู่แล้ว!');
    }
    else if (currentMode === 3) {
        let m = koState.matches.find(x => x.id === court.koMatchId);
        m.done = true; m.res = result;
        if(result === 'A' || result === 'D') { koState.winners.push(teamA); koState.losers.push(teamB); } 
        else { koState.winners.push(teamB); koState.losers.push(teamA); }

        court.teamA = []; court.teamB = []; court.status = 'idle'; court.koMatchId = null; court.koLabel = '';

        if(koState.matches.every(x => x.done)) {
            if(koState.round === 1) {
                koState.round = 2;
                koState.matches = [
                    { id: 3, tA: koState.winners[0], tB: koState.winners[1], res: null, done: false, label: '🏆 ชิงชนะเลิศ' },
                    { id: 4, tA: koState.losers[0], tB: koState.losers[1], res: null, done: false, label: '🥉 ชิงที่ 3' }
                ];
                koState.winners = []; koState.losers = [];
                showToast('เข้าสู่รอบชิง!');
            } else { showToast('จบทัวร์นาเมนต์แล้ว!'); }
        }
        assignKoMatches();
    }
    renderSession();
}

function reshuffleCourt(courtId) {
    const court = courts.find(c=>c.id===courtId);
    if (!court || currentMode !== 1) return; 
    [...court.teamA, ...court.teamB].forEach(p => { if (!waitingQueue.includes(p.id)) waitingQueue.push(p.id); });
    court.status = 'idle'; court.teamA = []; court.teamB = [];
    tryFillCourtMode1(court);
    renderSession();
}
function setResult(courtId, result) {
    const court = courts.find(c=>c.id===courtId);
    if (!court || court.status!=='playing') return;
    court.result = court.result===result ? null : result;
    renderSession();
}

// ================================================================
// RENDER SESSION
// ================================================================
function renderSession() {
    if(currentMode === 3) document.getElementById('koRoundText').innerText = 'Round ' + koState.round;
    else renderQueue();
    renderCourtCards();
}

function renderQueue() {
    const badge = document.getElementById('queueCountBadge');
    const el = document.getElementById('queueList');
    
    if (currentMode === 1) {
        badge.innerText = waitingQueue.length;
        if (!waitingQueue.length) { el.innerHTML = '<p class="text-slate-300 text-xs">ไม่มีผู้เล่นรอ</p>'; return; }
        const sorted = waitingQueue.map(id => players.find(p=>p.id===id)).filter(Boolean).sort((a,b) => a.games-b.games);
        const nextFour = sorted.slice(0,4).map(p=>p.id);
        el.innerHTML = sorted.map(p => {
            const isNext = nextFour.includes(p.id) && waitingQueue.length>=4;
            return `<div class="q-chip ${isNext?'next':''}">${p.name} <span style="opacity:.55;font-size:10px">⭐${p.skill} · &#127918;${p.games}</span></div>`;
        }).join('');
    } 
    else if (currentMode === 2) {
        badge.innerText = teamQueue.length + ' ทีม';
        if (!teamQueue.length) { el.innerHTML = '<p class="text-slate-300 text-xs">ไม่มีทีมรอต่อคิว</p>'; return; }
        el.innerHTML = teamQueue.map((tId, idx) => {
            let t = fixedTeams.find(x=>x.id === tId);
            return `<div class="q-chip ${idx===0?'next':''}">
                <span class="font-black text-indigo-500">${t.label}:</span> ${t.p1.name} & ${t.p2.name}
            </div>`;
        }).join('');
    }
}

function renderCourtCards() {
    const skillSum = arr => arr.reduce((s,p)=>s+(p.skill||3),0);
    document.getElementById('courtCards').innerHTML = courts.map(court => {

        if (court.status==='idle') {
            if (currentMode === 3) return `<div class="court-card idle"><div class="px-5 py-4 text-center text-xs text-slate-400 font-bold">รอการแข่งขันรอบต่อไป...</div></div>`;
            const canFill = currentMode === 1 ? waitingQueue.length >= 4 : teamQueue.length >= 2;
            return `<div class="court-card idle pop-in">
                <div class="px-5 py-4 flex items-center justify-between">
                    <div>
                        <div class="text-[11px] font-black text-slate-400 uppercase tracking-widest">COURT ${court.id}</div>
                        <div class="text-slate-300 text-xs mt-0.5">${canFill ? 'คิวพร้อมแล้ว — กดเริ่มได้เลย' : 'รอคิวเพิ่ม'}</div>
                    </div>
                    ${canFill ? `<button onclick="currentMode===1?tryFillCourtMode1(courts.find(c=>c.id===${court.id})):fillMode2Court(courts.find(c=>c.id===${court.id}),2);renderSession();" class="btn-indigo text-white text-xs font-black px-4 py-2.5 rounded-xl active:scale-95 flex items-center gap-1.5"><i data-lucide="play" class="w-3.5 h-3.5"></i> เริ่มเลย</button>` : ``}
                </div>
            </div>`;
        }

        const sA = skillSum(court.teamA), sB = skillSum(court.teamB);
        let tA_label = 'Team A', tB_label = 'Team B';
        
        if (currentMode === 2) {
            let fixA = fixedTeams.find(t=>t.id===court.teamA_id);
            let fixB = fixedTeams.find(t=>t.id===court.teamB_id);
            tA_label = `${fixA.label} ${fixA.streak>0 ? `<span class="text-[9px] bg-rose-100 text-rose-600 px-1 rounded">🔥ชนะ ${fixA.streak}</span>`:''}`;
            tB_label = `${fixB.label} ${fixB.streak>0 ? `<span class="text-[9px] bg-rose-100 text-rose-600 px-1 rounded">🔥ชนะ ${fixB.streak}</span>`:''}`;
        }

        return `<div class="court-card playing pop-in">
            <div class="flex items-center justify-between px-5 pt-4 pb-2">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-indigo-400 animate-pulse"></span>
                    <span class="text-[11px] font-black text-indigo-500 uppercase tracking-widest">
                        COURT ${court.id} ${court.koLabel ? ` <span class="bg-indigo-100 text-indigo-600 px-1.5 py-0.5 rounded ml-1">${court.koLabel}</span>` : ''}
                    </span>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-[10px] text-slate-400 font-bold">${currentMode === 1 ? 'สุ่มบาลานซ์' : currentMode===2 ? 'วนรอบ/อยู่ต่อ' : '⚔️ Knockout'}</span>
                    ${currentMode === 1 ? `<button onclick="reshuffleCourt(${court.id})" class="p-1.5 text-slate-300 hover:text-indigo-400 rounded-xl"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i></button>` : ''}
                </div>
            </div>

            <div class="flex flex-col sm:flex-row items-stretch">
                <div class="team-a flex-1 px-5 py-3 text-center">
                    <div class="text-indigo-500 text-[10px] font-black uppercase tracking-wider mb-1.5">${tA_label} · ⭐${sA}</div>
                    ${court.teamA.map(p=>`<div class="font-black text-slate-800 text-sm leading-snug">${p.name}</div>`).join('')}
                </div>
                <div class="flex items-center justify-center px-3 py-1"><span class="text-slate-300 font-black text-xs">VS</span></div>
                <div class="team-b flex-1 px-5 py-3 text-center">
                    <div class="text-rose-500 text-[10px] font-black uppercase tracking-wider mb-1.5">${tB_label} · ⭐${sB}</div>
                    ${court.teamB.map(p=>`<div class="font-black text-slate-800 text-sm leading-snug">${p.name}</div>`).join('')}
                </div>
            </div>

            <div class="px-4 pb-4 pt-1.5">
                <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-2 text-center">ผลการแข่ง</div>
                <div class="flex gap-2 mb-2.5">
                    <button class="res-btn res-a ${court.result==='A'?'on':''}" onclick="setResult(${court.id},'A')">A ชนะ</button>
                    ${currentMode !== 3 ? `<button class="res-btn res-d ${court.result==='D'?'on':''}" onclick="setResult(${court.id},'D')">เสมอ</button>` : ''}
                    <button class="res-btn res-b ${court.result==='B'?'on':''}" onclick="setResult(${court.id},'B')">B ชนะ</button>
                </div>
                <button onclick="finishCourt(${court.id})" class="w-full py-3 rounded-2xl font-black text-sm active:scale-95 transition-all flex items-center justify-center gap-2 ${court.result ? 'btn-green text-white' : 'bg-slate-100 text-slate-400 shadow-none'}">
                    <i data-lucide="check-circle" class="w-4 h-4"></i> จบเกม + ดึงทีมถัดไป
                </button>
            </div>
        </div>`;
    }).join('');
    lucide.createIcons();
}

function clearHistory(){ partnerHistory=[]; opponentHistory=[]; showToast('ล้างประวัติทั้งหมดแล้ว!'); }
function resetAll(){
    if(!confirm('ล้างข้อมูลทั้งหมดและเริ่มใหม่?'))return;
    players=[]; partnerHistory=[]; opponentHistory=[]; shuttleEntries=[]; splitSelected={};
    courts=[]; waitingQueue=[]; sessionActive=false; localStorage.removeItem('bm_players'); location.reload();
}
function showToast(msg){
    const t=document.getElementById('toast'); t.innerText=msg; t.style.opacity='1';
    clearTimeout(t._t); t._t=setTimeout(()=>t.style.opacity='0',2500);
}

function renderStats() {
    const list=document.getElementById('statsList'),empty=document.getElementById('statsEmpty');
    const with_s=players.filter(p=>(p.wins+p.losses+p.draws)>0);
    if (!with_s.length){list.innerHTML='';empty.style.display='block';return;}
    empty.style.display='none';
    const sorted=[...with_s].sort((a,b)=>{ const d=winRate(b)-winRate(a); return d!==0?d:(b.wins+b.losses+b.draws)-(a.wins+a.losses+a.draws); });
    list.innerHTML=sorted.map((p,i)=>{
        const wr=winRate(p), medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
        return `<div class="stat-card pop-in" style="animation-delay:${i*0.05}s"><div class="flex items-center gap-4 px-5 py-4"><div class="text-2xl w-8 text-center">${medal||`<span class="text-slate-400 text-sm font-black">${i+1}</span>`}</div><div class="flex-1 min-w-0"><div class="flex items-center justify-between mb-1"><div><span class="font-black text-slate-800">${p.name}</span></div><span class="font-black text-lg ${wr>=60?'text-emerald-500':wr>=40?'text-amber-500':'text-rose-400'}">${wr}%</span></div><div class="winbar-bg mb-2"><div class="winbar-fill" style="width:${wr}%"></div></div><div class="flex gap-3 text-xs flex-wrap"><span class="font-bold text-emerald-600">▲ ${p.wins} ชนะ</span><span class="font-bold text-rose-400">▼ ${p.losses} แพ้</span>${p.draws>0?`<span class="font-bold text-slate-400">— ${p.draws} เสมอ</span>`:''}<span class="text-slate-300 ml-auto">&#127918; ${p.games} เกม</span></div></div></div></div>`;
    }).join(''); lucide.createIcons();
}
function winRate(p){const t=p.wins+p.losses+p.draws;return t?Math.round((p.wins/t)*100):0;}
function clearAllStats(){ if(confirm('ล้างสถิติ win/loss ของทุกคน?')){players.forEach(p=>{p.wins=0;p.losses=0;p.draws=0;p.games=0;}); save(); renderStats();}}

function renderMoneyPage(){
    const sel=document.getElementById('payerSelect'),cur=sel.value;
    sel.innerHTML='<option value="">-- เลือกคนที่จ่ายก่อน --</option>'+ players.map(p=>`<option value="${p.id}" ${p.id===cur?'selected':''}>${p.name}</option>`).join('');
    renderShuttleList();renderSplitPlayers();
}
function renderShuttleList(){
    const l=document.getElementById('shuttleList'),e=document.getElementById('shuttleEmpty'),b=document.getElementById('shuttleSummaryBar');
    if(!shuttleEntries.length){l.innerHTML='';e.style.display='block';b.classList.add('hidden');lucide.createIcons();return;}
    e.style.display='none'; let tQ=0,tV=0;
    l.innerHTML=shuttleEntries.map(en=>{
        const v=en.qty*en.price;tQ+=en.qty;tV+=v;
        return `<div class="shuttle-entry flex flex-wrap items-center gap-2"><select onchange="updateShuttleOwner('${en.id}',this.value)" class="flex-1 min-w-[110px] px-3 py-2.5 bg-white border border-slate-200 rounded-xl text-sm font-bold text-slate-700"><option value="">-- เจ้าของลูก --</option>${players.map(p=>`<option value="${p.id}" ${p.id===en.ownerId?'selected':''}>${p.name}</option>`).join('')}<option value="__pool__" ${en.ownerId==='__pool__'?'selected':''}>🛒 ซื้อกลาง</option></select><div class="flex items-center bg-white border border-slate-200 rounded-xl px-1.5 py-1 gap-0.5"><button onclick="adjShuttle('${en.id}',-1)" class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-500 font-black">&#8722;</button><span class="w-6 text-center font-black text-slate-700 text-sm">${en.qty}</span><button onclick="adjShuttle('${en.id}',1)" class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-500 font-black">&#43;</button></div><div class="flex items-center gap-1 bg-white border border-slate-200 rounded-xl px-2.5 py-1.5"><input type="number" value="${en.price}" min="1" onchange="updateShuttlePrice('${en.id}',this.value)" class="w-14 text-center font-black text-emerald-700 text-sm bg-transparent focus:outline-none"></div><span class="text-xs text-emerald-600 font-black w-14 text-right">${v.toLocaleString()}฿</span><button onclick="rmShuttle('${en.id}')" class="text-slate-300 hover:text-red-400"><i data-lucide="x" class="w-4 h-4"></i></button></div>`;
    }).join('');
    document.getElementById('shuttleTotalText').innerText=`${tQ} ลูก = ${tV.toLocaleString()} ฿`; b.classList.remove('hidden');lucide.createIcons();
}
function addShuttleEntry(){shuttleEntries.push({id:Math.random().toString(36).substr(2,9),ownerId:'',qty:1,price:20});renderShuttleList();}
function rmShuttle(id){shuttleEntries=shuttleEntries.filter(e=>e.id!==id);renderShuttleList();}
function updateShuttleOwner(id,v){const e=shuttleEntries.find(x=>x.id===id);if(e)e.ownerId=v;renderShuttleList();}
function updateShuttlePrice(id,v){const e=shuttleEntries.find(x=>x.id===id);if(e)e.price=Math.max(1,parseFloat(v)||1);renderShuttleList();}
function adjShuttle(id,d){const e=shuttleEntries.find(x=>x.id===id);if(e)e.qty=Math.max(1,e.qty+d);renderShuttleList();}
function renderSplitPlayers(){
    const l=document.getElementById('splitPlayerList'); players.forEach(p=>{if(splitSelected[p.id]===undefined)splitSelected[p.id]=true;});
    l.innerHTML=players.map(p=>{
        const on=splitSelected[p.id]!==false;
        return `<button onclick="toggleSplit('${p.id}')" class="flex items-center gap-2 px-3 py-2.5 rounded-2xl border-2 text-sm font-bold transition-all ${on?'border-emerald-400 bg-emerald-50 text-emerald-800':'border-slate-200 bg-white text-slate-400'}"><span class="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-black flex-shrink-0 ${on?'bg-emerald-400 text-white':'bg-slate-200 text-transparent'}">&#10003;</span>${p.name}</button>`;
    }).join('');
}
function toggleSplit(id){splitSelected[id]=!splitSelected[id];renderSplitPlayers();}
function toggleAllSplit(v){players.forEach(p=>splitSelected[p.id]=v);renderSplitPlayers();}
function calculateMoney(){
    const payerId=document.getElementById('payerSelect').value; if(!payerId){alert('เลือกคนที่จ่ายก่อนด้วยนะ');return;}
    const courtFee=parseFloat(document.getElementById('courtFee').value)||0; const splitters=players.filter(p=>splitSelected[p.id]);
    if(!splitters.length){alert('เลือกคนร่วมหารอย่างน้อย 1 คน');return;}
    const totalShuttle=shuttleEntries.reduce((s,e)=>s+e.qty*e.price,0); const total=courtFee+totalShuttle, share=total/splitters.length;
    const credit={}; shuttleEntries.forEach(e=>{if(e.ownerId&&e.ownerId!=='__pool__')credit[e.ownerId]=(credit[e.ownerId]||0)+e.qty*e.price;});
    const payer=players.find(p=>p.id===payerId); const fmt=n=>Math.round(n).toLocaleString();
    const payerNet=(courtFee+(credit[payerId]||0))-share; const res=document.getElementById('moneyResult');
    res.classList.remove('hidden');
    res.innerHTML=`<div class="money-card pop-in"><div class="bg-gradient-to-r from-emerald-500 to-teal-500 px-5 py-4"><p class="text-emerald-100 text-[10px] font-bold uppercase tracking-widest mb-1">ยอดรวมทั้งหมด</p><p class="text-white text-3xl font-black">${fmt(total)} <span class="text-lg">฿</span></p><p class="text-emerald-100 text-xs mt-1">หาร ${splitters.length} คน = คนละ <span class="font-black text-white">${fmt(share)} ฿</span></p></div></div><div class="money-card pop-in" style="animation-delay:0.07s"><div class="px-5 py-3 bg-slate-50 border-b border-slate-100"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">ยอดสุทธิแต่ละคน</p></div>${splitters.map(p=>{const c=credit[p.id]||0, isPayer=p.id===payerId;if(isPayer){const recv=Math.round(payerNet);return `<div class="owes-row"><div><span class="font-black text-slate-800 text-sm">${p.name}</span><span class="chip chip-yellow ml-2">จ่ายก่อน</span>${c>0?`<span class="chip chip-green ml-1">+ลูก ${fmt(c)}฿</span>`:''}</div><div class="text-right">${recv>=0?`<div class="text-emerald-600 font-black">รับ ${fmt(recv)} ฿</div>`:`<div class="text-blue-500 font-black">คืน ${fmt(Math.abs(recv))} ฿</div>`}</div></div>`;}const net=Math.round(share-c);if(net<=0) return `<div class="owes-row"><div><span class="font-black text-slate-800 text-sm">${p.name}</span>${c>0?`<span class="chip chip-green ml-2">+ลูก ${fmt(c)}฿</span>`:''}</div><div class="text-right"><div class="text-blue-500 font-black">${payer.name} คืน ${fmt(Math.abs(net))} ฿</div></div></div>`;return `<div class="owes-row"><div><span class="font-black text-slate-800 text-sm">${p.name}</span>${c>0?`<span class="chip chip-green ml-2">+ลูก ${fmt(c)}฿</span>`:''}</div><div class="text-right"><div class="text-rose-500 font-black">จ่าย ${fmt(net)} ฿</div><div class="text-[10px] text-slate-400">ให้ ${payer.name}</div></div></div>`;}).join('')}</div>`;
}

renderPlayers(); lucide.createIcons();
