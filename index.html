<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Badmy Match Maker - Doubles Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap');
        body { font-family: 'Kanit', sans-serif; }
        .player-card { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-3 sm:p-6">
    <div class="max-w-4xl mx-auto">
        
        <header class="flex items-center justify-between mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-2xl font-extrabold text-indigo-600 flex items-center gap-2">🏸 BadmyMatch <span class="text-xs bg-indigo-100 px-2 py-1 rounded-lg">2v2</span></h1>
                <p class="text-slate-500 text-xs">ระบบจัดคู่แบดมินตันแบบทีม (1 คอร์ท 4 คน)</p>
            </div>
            <button onclick="resetAll()" class="p-2 text-slate-400 hover:text-red-500 rounded-full transition-all">
                <i data-lucide="rotate-ccw"></i>
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-slate-700">
                        <i data-lucide="user-plus" class="text-indigo-500 w-5 h-5"></i> เพิ่มผู้เล่น
                    </h2>
                    <div class="space-y-4">
                        <input type="text" id="playerName" placeholder="ชื่อผู้เล่น" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:outline-none text-base">
                        <div class="bg-slate-50 p-3 rounded-2xl border border-slate-200">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 block">ระดับฝีมือ (<span id="skillVal">3</span> ดาว)</label>
                            <input type="range" id="playerSkill" min="1" max="5" value="3" oninput="document.getElementById('skillVal').innerText = this.value" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                        </div>
                        <button onclick="addPlayer()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-md active:scale-95">เพิ่มเข้าก๊วน</button>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <div class="flex items-center justify-between">
                        <span class="font-bold text-slate-700 flex items-center gap-2"><i data-lucide="layout-grid" class="text-indigo-500 w-5 h-5"></i> จำนวนคอร์ทที่มี</span>
                        <input type="number" id="courtCount" value="1" min="1" class="w-16 p-2 text-center border border-slate-200 rounded-xl font-bold text-indigo-600">
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-lg font-bold mb-4 flex items-center justify-between text-slate-700">
                    <span>สมาชิกทั้งหมด (<span id="playerCount">0</span>)</span>
                </h2>
                <div id="playerList" class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-[250px] overflow-y-auto pr-2"></div>
            </div>
        </div>

        <div class="mt-8 space-y-6">
            <div class="flex gap-3">
                <button onclick="generateMatches()" class="flex-[2] py-5 bg-emerald-500 text-white rounded-3xl font-black text-xl shadow-lg active:scale-95 flex items-center justify-center gap-2">สุ่มทีมแข่งขัน!</button>
                <button onclick="clearHistory()" title="ล้างประวัติคู่ซ้ำ" class="flex-1 py-5 bg-white border border-slate-200 rounded-3xl text-slate-500 font-bold active:scale-95 flex items-center justify-center gap-2"><i data-lucide="history"></i></button>
            </div>

            <div id="results" class="hidden space-y-4">
                <h2 class="text-xl font-black text-slate-800 underline decoration-indigo-300 underline-offset-8">ตารางคอร์ทที่จัด</h2>
                <div id="matchGrid" class="grid grid-cols-1 gap-4"></div>
                
                <div id="waitingSection" class="hidden bg-amber-50 p-5 rounded-[2rem] border border-amber-100 shadow-inner">
                    <h3 class="text-amber-700 font-black text-sm mb-3 uppercase tracking-wider">⏳ พักรอ / บาย (<span id="waitCount">0</span> คน)</h3>
                    <div id="waitingList" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('badmy_players')) || [];
        let partnerHistory = []; // เก็บ "ID1-ID2" ของคนที่เคยเป็นคู่หูกัน

        function save() {
            localStorage.setItem('badmy_players', JSON.stringify(players));
            renderPlayers();
        }

        function addPlayer() {
            const nameInput = document.getElementById('playerName');
            const skill = parseInt(document.getElementById('playerSkill').value);
            if (!nameInput.value.trim()) return;
            players.push({ id: Math.random().toString(36).substr(2, 9), name: nameInput.value.trim(), skill });
            nameInput.value = '';
            save();
        }

        function removePlayer(id) {
            players = players.filter(p => p.id !== id);
            save();
        }

        function renderPlayers() {
            const list = document.getElementById('playerList');
            document.getElementById('playerCount').innerText = players.length;
            list.innerHTML = players.map(p => `
                <div class="flex items-center justify-between bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <div class="text-sm font-bold text-slate-700">${p.name} <span class="text-indigo-400 font-normal">⭐${p.skill}</span></div>
                    <button onclick="removePlayer('${p.id}')" class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function generateMatches() {
            if (players.length < 4) {
                alert("ต้องมีผู้เล่นอย่างน้อย 4 คนสำหรับเล่นคู่ (2v2)");
                return;
            }

            const courtCount = parseInt(document.getElementById('courtCount').value);
            // สุ่มลำดับผู้เล่น (Shuffle)
            let pool = [...players].sort(() => Math.random() - 0.5);
            
            const matches = [];

            for (let c = 0; c < courtCount; c++) {
                if (pool.length < 4) break;

                // ดึง 4 คนออกมาสำหรับคอร์ทนี้
                let group = pool.splice(0, 4);
                
                // Logic หาคู่หูที่ดีที่สุด (พยายามไม่ให้คู่กับคนเดิม)
                // ทดลอง 3 รูปแบบการจับคู่ใน 4 คนนี้ (1+2 vs 3+4, 1+3 vs 2+4, 1+4 vs 2+3)
                // เลือกรูปแบบที่มีประวัติการคู่กันน้อยที่สุด
                let bestPairing = splitIntoTeams(group);
                
                matches.push({
                    court: c + 1,
                    teamA: [bestPairing.t1p1, bestPairing.t1p2],
                    teamB: [bestPairing.t2p1, bestPairing.t2p2]
                });

                // บันทึกประวัติคู่หู (Partner)
                partnerHistory.push(getPairKey(bestPairing.t1p1.id, bestPairing.t1p2.id));
                partnerHistory.push(getPairKey(bestPairing.t2p1.id, bestPairing.t2p2.id));
            }

            display(matches, pool);
        }

        function getPairKey(id1, id2) {
            return [id1, id2].sort().join('-');
        }

        function splitIntoTeams(g) {
            // เพื่อความง่าย: เราจะสลับตำแหน่งในกลุ่ม 4 คนให้ได้คู่ที่ใหม่ที่สุด
            // รูปแบบที่ 1: (0,1) vs (2,3)
            // รูปแบบที่ 2: (0,2) vs (1,3)
            // รูปแบบที่ 3: (0,3) vs (1,2)
            
            const options = [
                { t1: [g[0], g[1]], t2: [g[2], g[3]], score: 0 },
                { t1: [g[0], g[2]], t2: [g[1], g[3]], score: 0 },
                { t1: [g[0], g[3]], t2: [g[1], g[2]], score: 0 }
            ];

            options.forEach(opt => {
                if (partnerHistory.includes(getPairKey(opt.t1[0].id, opt.t1[1].id))) opt.score++;
                if (partnerHistory.includes(getPairKey(opt.t2[0].id, opt.t2[1].id))) opt.score++;
            });

            // เลือกตัวเลือกที่มี Score ต่ำสุด (เจอกันซ้ำน้อยสุด)
            const best = options.sort((a, b) => a.score - b.score)[0];

            return {
                t1p1: best.t1[0], t1p2: best.t1[1],
                t2p1: best.t2[0], t2p2: best.t2[1]
            };
        }

        function display(matches, waiting) {
            const res = document.getElementById('results');
            const grid = document.getElementById('matchGrid');
            const waitSection = document.getElementById('waitingSection');
            const waitList = document.getElementById('waitingList');

            res.classList.remove('hidden');
            grid.innerHTML = matches.map(m => `
                <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 bg-indigo-600 text-white px-4 py-1 rounded-bl-2xl text-[10px] font-bold">COURT ${m.court}</div>
                    
                    <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div class="flex-1 text-center sm:text-right">
                            <div class="text-indigo-600 text-[10px] font-bold uppercase mb-1">Team A</div>
                            <div class="font-black text-slate-800 leading-tight">${m.teamA[0].name} <span class="text-xs font-normal">⭐${m.teamA[0].skill}</span></div>
                            <div class="font-black text-slate-800 leading-tight">${m.teamA[1].name} <span class="text-xs font-normal">⭐${m.teamA[1].skill}</span></div>
                        </div>

                        <div class="text-slate-300 font-black italic text-xl">VS</div>

                        <div class="flex-1 text-center sm:text-left">
                            <div class="text-rose-500 text-[10px] font-bold uppercase mb-1">Team B</div>
                            <div class="font-black text-slate-800 leading-tight">${m.teamB[0].name} <span class="text-xs font-normal">⭐${m.teamB[0].skill}</span></div>
                            <div class="font-black text-slate-800 leading-tight">${m.teamB[1].name} <span class="text-xs font-normal">⭐${m.teamB[1].skill}</span></div>
                        </div>
                    </div>
                </div>
            `).join('');

            if (waiting.length > 0) {
                waitSection.classList.remove('hidden');
                document.getElementById('waitCount').innerText = waiting.length;
                waitList.innerHTML = waiting.map(p => `
                    <div class="bg-white px-4 py-2 rounded-2xl text-sm font-bold text-amber-900 shadow-sm border border-amber-200">
                        ${p.name} <span class="text-[10px] font-normal opacity-50">⭐${p.skill}</span>
                    </div>
                `).join('');
            } else {
                waitSection.classList.add('hidden');
            }
        }

        function clearHistory() { partnerHistory = []; alert('ล้างประวัติคู่หูเรียบร้อย เริ่มต้นใหม่ได้เลย!'); }
        function resetAll() { if(confirm('ล้างข้อมูลสมาชิกทั้งหมด?')) { players = []; partnerHistory = []; save(); location.reload(); } }

        renderPlayers();
        lucide.createIcons();
    </script>
</body>
</html>
